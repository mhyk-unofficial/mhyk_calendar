<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mhyk 活動資料庫</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
    :root { 
        --main-purple: #7d6ba1; --gacha-gold: #d4af37; --reward-blue: #5b8ad2; 
        --sr-silver: #a0a0a0; --r-bronze: #cd7f32; --bg-color: #fcf9f2; 
    }
    body { font-family: "PingFang TC", sans-serif; background: var(--bg-color); margin: 0; padding: 20px; }
    
    .header-section { background: #fff; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
    
    /* 統計區保持不變，或可稍微縮小 */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; margin-top: 15px; }
    .stat-item { background: #fff; border-radius: 8px; padding: 5px; text-align: center; border: 1px solid #eee; font-size: 10px; }
    .stat-item img { width: 30px; height: 30px; border-radius: 50%; }

    /* 修改為單欄橫式 */
    .event-grid { display: flex; flex-direction: column; gap: 10px; }
    
    .event-card { 
        background: #fff; border-radius: 8px; padding: 10px 15px; 
        border-left: 5px solid var(--main-purple); /* 改為左邊條 */
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        display: flex; align-items: center; gap: 20px; /* 橫向排列 */
    }

    /* 左側：期數與日期 */
    .event-time-box { min-width: 100px; text-align: center; border-right: 1px solid #eee; padding-right: 15px; }
    .event-period { font-size: 12px; color: var(--main-purple); font-weight: bold; }
    .event-date { font-size: 10px; color: #999; }

    /* 中間：名稱與看板 */
    .event-main-box { flex: 1; min-width: 200px; }
    .event-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 4px; }
    
    /* 右側：角色組區塊 */
    .event-chars-box { flex: 2; display: flex; flex-direction: column; gap: 5px; }

    /* 角色列：讓標籤與圖片更緊湊 */
    .char-row-wrapper { 
        display: flex; align-items: center; gap: 10px; 
        padding: 4px 8px; border-radius: 6px; background: #fafafa;
    }
    .char-group { display: flex; align-items: center; gap: 5px; }
    .char-label { font-size: 9px; padding: 1px 4px; min-width: 40px; }
    .char-list img { width: 32px; height: 32px; border-radius: 4px; }
    .chibi-img { width: 28px; height: 28px; }

    /* 搜尋框 */
    .search-bar { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; }

    /* 手機版自動切換回垂直排版 */
    @media (max-width: 768px) {
        .event-card { flex-direction: column; align-items: flex-start; gap: 10px; border-left: none; border-top: 5px solid var(--main-purple); }
        .event-time-box { border-right: none; text-align: left; padding: 0; }
    }
</style>
</head>
<body>

<div class="header-section">
    <input type="text" id="searchInput" class="search-bar" placeholder="🔍 搜尋活動或角色..." oninput="handleSearch()">
    <h3>📊 出卡統計 (SSR)</h3>
    <div id="statsGrid" class="stats-grid">讀取中...</div>
</div>

<div id="eventList" class="event-grid">載入中...</div>

<script>
    // 試算表 CSV 連結與圖片來源
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT_3vvzhb6VzcCYkVqberJIlPAeLIIWhWAIP1Oix6k3ItsBTclFSBXlXUCZIUsML82QiT-E7EScRAr6/pub?gid=1107156854&single=true&output=csv';
    const IMG_BASE_URL = 'https://mhyk-unofficial.github.io/mhyk_SSR_filter/mini_';

    // 角色中日對照表
    const nameMap = {
        "オズ": "Oz", "アーサー": "Arthur", "カイン": "Cain", "リケ": "Riquet",
        "スノウ": "Snow", "ホワイト": "White", "ミスラ": "Mithra", "オーエン": "Owen", "ブラッドリー": "Bradley",
        "ファウスト": "Faust", "シノ": "Shino", "ヒースクリフ": "Heathcliff", "ネロ": "Nero",
        "シャイロック": "Shylock", "ムル": "Murr", "クロエ": "Chloe", "ラスティカ": "Rustica",
        "フィガロ": "Figaro", "ルチル": "Rutile", "レノックス": "Lennox", "ミチル": "Mitile",
        "奧茲": "Oz", "亞瑟": "Arthur", "凱因": "Cain", "利凱": "Riquet",
        "思諾": "Snow", "懷特": "White", "密斯拉": "Mithra", "歐文": "Owen", "布拉德利": "Bradley",
        "浮士德": "Faust", "西諾": "Shino", "希斯克里夫": "Heathcliff", "尼洛": "Nero",
        "夏洛克": "Shylock", "姆魯": "Murr", "庫羅耶": "Chloe", "拉斯堤卡": "Rustica",
        "費加洛": "Figaro", "路契爾": "Rutile", "雷諾克斯": "Lennox", "米契爾": "Mitile"
    };

    const idToJp = { "Oz": "オズ", "Arthur": "アーサー", "Cain": "カイン", "Riquet": "リケ", "Snow": "スノウ", "White": "ホワイト", "Mithra": "ミスラ", "Owen": "オーエン", "Bradley": "ブラッドリー", "Faust": "ファウスト", "Shino": "シノ", "Heathcliff": "ヒースクリフ", "Nero": "ネロ", "Shylock": "シャイロック", "Murr": "ムル", "Chloe": "クロエ", "Rustica": "ラスティカ", "Figaro": "フィガロ", "Rutile": "ルチル", "Lennox": "レノックス", "Mitile": "ミチル" };

    let allEvents = [];

    // 分隔字串工具
    function splitNames(str) {
        if (!str) return [];
        return str.split(/[,，\s/、\n]+/).filter(n => n.trim() !== "");
    }

    function init() {
        Papa.parse(CSV_URL, {
            download: true, header: true,
            complete: function(results) {
                // 過濾掉空行
                allEvents = results.data.filter(row => row['活動名稱']);
                renderPage(allEvents);
            }
        });
    }

    function renderPage(data) {
        renderStats(data);
        renderEvents(data);
    }

    // SSR 統計邏輯 (自動校正版)
    function renderStats(data) {
        let stats = {};
        Object.values(nameMap).forEach(id => {
            if (!stats[id]) stats[id] = { gacha: 0, reward: 0 };
        });

        data.forEach(item => {
            // 工具：自動尋找包含關鍵字的欄位內容
            const findValue = (keyword) => {
                const target = keyword.toUpperCase();
                const key = Object.keys(item).find(k => k.toString().toUpperCase().replace(/\s+/g, '').includes(target));
                return item[key] || "";
            };

            const gachas = splitNames(findValue('卡池SSR'));
            const rewards = splitNames(findValue('報酬SSR'));
            
            gachas.forEach(n => {
                const id = nameMap[n.trim()];
                if (id) stats[id].gacha++;
            });
            rewards.forEach(n => {
                const id = nameMap[n.trim()];
                if (id) stats[id].reward++;
            });
        });

        const sorted = Object.entries(stats).sort((a, b) => (b[1].gacha + b[1].reward) - (a[1].gacha + a[1].reward));

        document.getElementById('statsGrid').innerHTML = sorted.map(([id, count]) => `
            <div class="stat-item">
                <img src="${IMG_BASE_URL}${id}.png">
                <div class="stat-name">${idToJp[id] || id}</div>
                <div class="stat-counts">
                    <span style="color:var(--gacha-gold)">卡池:${count.gacha}</span> | 
                    <span style="color:var(--reward-blue)">報酬:${count.reward}</span>
                </div>
            </div>
        `).join('');
    }

    // 活動列表渲染邏輯 (新排版版)
    function renderEvents(data) {
        const container = document.getElementById('eventList');
        if (!data || data.length === 0) {
            container.innerHTML = "沒有找到匹配的資料。";
            return;
        }

        container.innerHTML = data.map(item => {
            // 工具：自動模糊比對欄位名稱並取值
            const findValue = (keyword) => {
                const target = keyword.toUpperCase();
                const key = Object.keys(item).find(k => {
                    const normalizedK = k.toString().toUpperCase().replace(/\s+/g, '');
                    return normalizedK.includes(target);
                });
                return item[key] || "";
            };

            const getIdsFromVal = (val) => new Set(splitNames(val).map(n => nameMap[n.trim()]).filter(id => id));

            // 準備所有卡片組的資料
            const sets = {
                gSSR: getIdsFromVal(findValue('卡池SSR')),
                gSR:  getIdsFromVal(findValue('卡池SR')),
                gR:   getIdsFromVal(findValue('卡池R')),
                rSSR: getIdsFromVal(findValue('報酬SSR')),
                rSR:  getIdsFromVal(findValue('報酬SR')),
                rR:   getIdsFromVal(findValue('報酬R')),
                chibi4: getIdsFromVal(findValue('四星小人')),
                chibi3: getIdsFromVal(findValue('三星小人'))
            };

            // 繪製「單一標籤+圖片」的群組
            const drawGroup = (label, ids, colorClass, isChibi = false) => {
                if (!ids || ids.size === 0) return '';
                const imgClass = isChibi ? 'chibi-img' : 'char-img';
                const imgs = Array.from(ids).map(id => 
                    `<img src="${IMG_BASE_URL}${id}.png" class="${imgClass}" title="${idToJp[id] || id}" onerror="this.src='https://via.placeholder.com/40?text=?'">`
                ).join('');
                return `<div class="char-group"><span class="char-label ${colorClass}">${label}</span><div class="char-list">${imgs}</div></div>`;
            };

            // 繪製「灰色橫列」容器，會自動包含多個群組
            const wrapRows = (...groups) => {
                const validGroups = groups.filter(g => g !== '');
                if (validGroups.length === 0) return '';
                return `<div class="char-row-wrapper">${validGroups.join('')}</div>`;
            };

            // 處理看板角色 (顯示在標題右側)
            const leaderName = (item['看板角色'] || '').trim();
            const leaderId = nameMap[leaderName];
            
            // 處理天數文字 (例如：(9天))
            const daysText = item['天數'] ? ` (${item['天數']})` : '';

            return `
                <div class="event-card">
                    <div class="event-time-box">
                        <div class="event-period">第 ${item['期數'] || '-'} 期</div>
                        <div class="event-date">${item['日期'] || '-'}${daysText}</div>
                    </div>
                    
                    <div class="event-main-box">
                        <div class="event-title">${item['活動名稱'] || '未命名活動'}</div>
                        ${leaderId ? `<div class="char-group">${drawGroup('看板', new Set([leaderId]), 'lbl-leader')}</div>` : ''}
                    </div>
                    
                    <div class="event-chars-box">
                        ${wrapRows(
                            drawGroup('卡池SSR', sets.gSSR, 'lbl-ssr'),
                            drawGroup('卡池SR', sets.gSR, 'lbl-sr'),
                            drawGroup('卡池R', sets.gR, 'lbl-r')
                        )}
                        
                        ${wrapRows(
                            drawGroup('報酬SSR', sets.rSSR, 'lbl-reward'),
                            drawGroup('報酬SR', sets.rSR, 'lbl-reward'),
                            drawGroup('報酬R', sets.rR, 'lbl-reward')
                        )}
                        
                        ${wrapRows(
                            drawGroup('4星', sets.chibi4, 'lbl-chibi', true),
                            drawGroup('3星', sets.chibi3, 'lbl-chibi', true)
                        )}
                    </div>
                </div>`;
        }).join('');
    }

    // 搜尋功能
    function handleSearch() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allEvents.filter(ev => 
            Object.values(ev).some(v => v.toString().toLowerCase().includes(term))
        );
        renderPage(filtered);
    }

    window.onload = init;
</script>
</body>
</html>
